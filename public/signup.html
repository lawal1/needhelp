<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up •</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body style="background: #f8f8f8;">

    <!-- Minimal top bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
                <span class="fs-3 me-2"></span>
               Needhelp.AI
            </a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
                    <div class="card-body p-5">
                        
                        <!-- Logo + Title -->
                        <div class="text-center mb-4">
                            <span class="fs-1">🤖</span>
                            <h2 class="fw-bold text-black mt-2">Create your free account</h2>
                            <p class="text-muted">Start training your AI support bot in minutes</p>
                        </div>

                        <form id="signupForm">
                            <div class="mb-4">
                                <label for="email" class="form-label fw-semibold text-black">Email address</label>
                                <input type="email" class="form-control form-control-lg" id="email" placeholder="you@email.com" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold text-black">Password</label>
                                <input type="password" class="form-control form-control-lg" id="password" required>
                            </div>

                            <button type="submit" class="btn btn-dark btn-lg w-100 py-3">
                                Sign Up — It's Free
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <a href="/login" class="text-decoration-none text-black">
                                Already have an account? <strong>Login</strong>
                            </a>
                        </div>

                        <div class="text-center mt-5 small text-muted">
                            Currently in <span class="badge bg-black text-white">FREE Beta</span><br>
                            Paid plans from ₦10,000/mo coming soon
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC8QXAM2cEySKJuhVPobuEH7nzSX8xyULA",
            authDomain: "observer-d8ad4.firebaseapp.com",
            databaseURL: "https://observer-d8ad4-default-rtdb.firebaseio.com",
            projectId: "observer-d8ad4",
            storageBucket: "observer-d8ad4.firebasestorage.app",
            messagingSenderId: "502571433434",
            appId: "1:502571433434:web:313b0635ad9706e18ed4e3",
            measurementId: "G-CXFDB13376"
        };
        firebase.initializeApp(firebaseConfig);
        
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await firebase.auth().createUserWithEmailAndPassword(email, password);
                window.location.href = '/dashboard';
            } catch (error) {
                alert('Signup failed: ' + error.message);
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
